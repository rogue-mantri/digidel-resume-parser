services:
  - type: web
    name: digidel-hiring-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: APP_ENV
        value: production
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
    healthCheckPath: /health
